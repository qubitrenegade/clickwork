[project]
name = "qbrd-tools"
version = "0.1.0"
description = "Reusable CLI framework for project automation"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "click>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qbrd_tools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
