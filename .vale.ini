# Vale config for the docs site. Runs in CI as advisory-only
# (fail_on_error: false in the workflow), so findings surface as PR
# annotations without blocking merge.

StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = write-good

[*.md]
BasedOnStyles = Vale, write-good

# Skip code blocks and inline code — they're not prose.
BlockIgnores = (?s)(?:``` *.*?``` *\n)
TokenIgnores = (?:`[^`]+`)
