site_name: clickwork
site_url: https://clickwork.readthedocs.io/
site_description: Reusable CLI framework for project automation.
repo_url: https://github.com/qubitrenegade/clickwork
repo_name: qubitrenegade/clickwork
edit_uri: edit/main/docs/

exclude_docs: |
  # GitHub-native stubs for moved files — not published on the site.
  GUIDE.md
  PLUGINS.md
  SECURITY.md
  VERIFYING.md
  MIGRATING.md
  ARCHITECTURE.md
  API_POLICY.md
  LLM_REFERENCE.md
  # Internal planning + spec artifacts under docs/ — kept close to the
  # work they describe but not for public publication. Without these,
  # `mkdocs build --strict` fails on them as orphan pages.
  plans/**
  superpowers/**

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 2
  - redirects:
      redirect_maps:
        GUIDE.md: reference/guide.md
        PLUGINS.md: reference/plugins.md
        SECURITY.md: reference/security.md
        VERIFYING.md: reference/verifying.md
        MIGRATING.md: reference/migrating.md
        LLM_REFERENCE.md: reference/llm-reference.md
        ARCHITECTURE.md: explanation/architecture.md
        API_POLICY.md: explanation/api-policy.md

nav:
  - Home: index.md
  - Tutorials:
      - Quickstart: tutorials/quickstart.md
      - Walkthrough:
          - tutorials/walkthrough/index.md
          - Your first command: tutorials/walkthrough/01-your-first-command.md
          - Adding a plugin: tutorials/walkthrough/02-adding-a-plugin.md
          - Packaging: tutorials/walkthrough/03-packaging.md
  - How-To:
      - how-to/index.md
      - Tame a script directory: how-to/tame-a-script-directory.md
      - Add a command: how-to/add-a-command.md
      - Write a plugin: how-to/write-a-plugin.md
      - Migrate from argparse: how-to/migrate-from-argparse.md
  - Explanation:
      - Architecture: explanation/architecture.md
      - API Policy: explanation/api-policy.md
      - Plugin Model: explanation/plugin-model.md
  - Reference:
      - User Guide: reference/guide.md
      - Plugins: reference/plugins.md
      - Security: reference/security.md
      - Verifying: reference/verifying.md
      - Migrating: reference/migrating.md
      - API Reference: reference/api.md
      - LLM Reference: reference/llm-reference.md
