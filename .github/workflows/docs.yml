name: Docs

# PR-only validation. Read the Docs handles the actual deploy off `main`
# via its own webhook, so there's no push-trigger / deploy-job here any
# more — the `.readthedocs.yaml` at the repo root is what drives
# production builds. This workflow's job is to catch build/lint
# regressions BEFORE they hit main, so RTD's next main-branch build
# succeeds.

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.readthedocs.yaml'
      - '.github/workflows/docs.yml'
      - '.markdownlint.yaml'
      - '.vale.ini'
      - '.vale/**'
      - 'pyproject.toml'
      - 'uv.lock'
      # src/** so PRs that only touch the codebase still surface
      # mkdocstrings / api.md rendering regressions before they hit
      # RTD on main. Without this, a code-only PR could break the
      # auto-generated API reference and only get caught in RTD's
      # post-merge build.
      - 'src/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # reviewdog (inside errata-ai/vale-action) posts Vale findings as
      # PR check annotations and inline review comments. Without these
      # writes it 403s when posting and the findings silently vanish
      # (even with continue-on-error suppressing the step-failure).
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        # Match the repo's other workflows (lint.yml, bench.yml,
        # publish.yml, release-smoke.yml): install AND pin the
        # interpreter so docs builds are reproducible as the
        # ubuntu-latest image's default Python drifts.
        run: |
          uv python install 3.13
          uv python pin 3.13

      - name: Install docs deps
        run: uv sync --frozen --extra docs

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yaml
          globs: |
            docs/**/*.md
            !docs/plans/**
            !docs/superpowers/**
            !docs/ARCHITECTURE.md
            !docs/API_POLICY.md
            !docs/GUIDE.md
            !docs/PLUGINS.md
            !docs/SECURITY.md
            !docs/VERIFYING.md
            !docs/MIGRATING.md
            !docs/LLM_REFERENCE.md

      - name: Vale (advisory)
        uses: errata-ai/vale-action@v2
        continue-on-error: true  # belt-and-suspenders: the action's
          # fail_on_error: false only affects Vale's own classification;
          # the underlying reviewdog wrapper still exits non-zero when
          # it posts findings, which bubbles up as a step failure.
          # continue-on-error makes the whole step always succeed so
          # Vale stays truly advisory.
        with:
          fail_on_error: false
          version: 3.9.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
