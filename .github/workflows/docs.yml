name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.markdownlint.yaml'
      - '.vale.ini'
      - '.vale/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.markdownlint.yaml'
      - '.vale.ini'
      - '.vale/**'
      - 'pyproject.toml'
      - 'uv.lock'

# src/** is intentionally ONLY in the push trigger (main-branch merges).
# reference/api.md is auto-generated from src/ via mkdocstrings, so a
# code-only merge to main must re-deploy to keep the API reference
# fresh. Leaving src/** out of the PR trigger preserves the "code-only
# PRs don't burn docs CI" intent.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # reviewdog (inside errata-ai/vale-action) posts Vale findings as
      # PR check annotations and inline review comments. Without these
      # writes it 403s when posting and the findings silently vanish
      # (even with continue-on-error suppressing the step-failure).
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        # Match the repo's other workflows (lint.yml, bench.yml,
        # publish.yml, release-smoke.yml): install AND pin the
        # interpreter so docs builds are reproducible as the
        # ubuntu-latest image's default Python drifts.
        run: |
          uv python install 3.13
          uv python pin 3.13

      - name: Install docs deps
        run: uv sync --frozen --extra docs

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yaml
          globs: |
            docs/**/*.md
            !docs/plans/**
            !docs/superpowers/**
            !docs/ARCHITECTURE.md
            !docs/API_POLICY.md
            !docs/GUIDE.md
            !docs/PLUGINS.md
            !docs/SECURITY.md
            !docs/MIGRATING.md
            !docs/LLM_REFERENCE.md

      - name: Vale (advisory)
        uses: errata-ai/vale-action@v2
        continue-on-error: true  # belt-and-suspenders: the action's
          # fail_on_error: false only affects Vale's own classification;
          # the underlying reviewdog wrapper still exits non-zero when
          # it posts findings, which bubbles up as a step failure.
          # continue-on-error makes the whole step always succeed so
          # Vale stays truly advisory.
        with:
          fail_on_error: false
          version: 3.9.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: |
          uv python install 3.13
          uv python pin 3.13

      - name: Install docs deps
        run: uv sync --frozen --extra docs

      - name: mkdocs gh-deploy
        run: uv run mkdocs gh-deploy --force
