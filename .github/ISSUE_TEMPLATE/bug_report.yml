name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below
        so we can reproduce and fix the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs what actually happened?
      placeholder: |
        I ran `my-tool --env staging deploy site` and got an error...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Create a config file with `[env.staging]` section
        2. Run `my-tool --env staging deploy site`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: |
        Paste the full error output. Run with `-vv` for debug-level
        detail. **Redact any secrets or credentials before pasting.**
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: clickwork version
      description: Output of `python -c "import clickwork; print(clickwork.__version__)"`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.13.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
